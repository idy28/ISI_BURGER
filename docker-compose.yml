version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: isi_burger_app
    working_dir: /var/www
    volumes:
      - .:/var/www:cached
      - vendor_data:/var/www/vendor
      - node_modules:/var/www/node_modules
      - composer_cache:/root/.composer
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - isi_network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: isi_burger_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - isi_network

  db:
    image: mysql:8
    container_name: isi_burger_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: isi_burger
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - isi_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: isi_burger_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - isi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  db_data:
  vendor_data:
  node_modules:
  composer_cache:

networks:
  isi_network:
